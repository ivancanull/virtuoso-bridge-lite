# Snapshot filter — what to keep when stripping Cadence Maestro XML
# files for snapshot output.  Acts as both *config* and *documentation*:
# every Cadence element we know about is listed below.  Items in
# `keep:` lists are kept in the filtered output.  Items in `drop:` lists
# are documented for reference but excluded from the filter — uncomment
# them under `keep:` if you want them included.
#
# Two files are filtered (raw copies kept under their Cadence names):
#   * maestro.sdb     →  state_from_sdb.xml
#   * active.state    →  state_from_active_state.xml
#
# This file is loaded once per snapshot.  Edit and re-run snapshot to
# change the filter behavior — no code changes required.

# ---------------------------------------------------------------------------
# maestro.sdb
# ---------------------------------------------------------------------------
# Top level:  <setupdb> contains <active> and many <history> snapshots.
# History snapshots are full duplicates of <active> at past run times —
# ~90% of total file bytes.  They are never kept; only <active> matters.
#
# Inside <active>, these direct children are known to Cadence.  Most are
# GUI prefs / view state with no setup intent.  The defaults below keep
# the high-signal ~10%.

maestro_sdb:
  active_keep:
    # The actual setup — what will run, with what knobs.
    - currentmode            # run mode (Single Run / Sweeps and Corners / ...)
    - jobcontrolmode         # LSCS / Local / ...
    - corners                # PVT corners (with vars / temperature / models)
    - tests                  # per-test setup (tooloptions / vars / outputs)
    - vars                   # global design variables
    - parameters             # per-instance CDF overrides
    - specs                  # design spec targets / limits
    - parametersets          # named parameter sweep sets
    - overwritehistoryname   # next-run history name

  active_drop:
    # GUI / view-state — uncomment under active_keep to include.
    # - plottingoptions       # waveform plot prefs
    # - outputscustomcols     # output table column layout
    # - runoptions            # GUI run-button prefs
    # - extensions            # ADE Assembler extensions toggles
    # - exploreroptions       # ADE Explorer toggles
    # - checksasserts         # checks/asserts toggle state
    # - incrementalsim        # incremental sim cache state
    # - incrementalsimcache   # ditto
    # - resultscustomcols     # results table column layout
    # - waveforms             # last-shown waveform list
    # - viewoptions           # tree view prefs

# ---------------------------------------------------------------------------
# active.state
# ---------------------------------------------------------------------------
# Top level:  <statedb> contains one or more <Test Name="..."> blocks.
# Inside each <Test>, components carry per-test state.  Most components
# exist on every test even when empty — they are placeholder containers
# that the GUI populates when used.
#
# The defaults keep the ones that hold actual setup; the rest are listed
# under components_drop with one-line descriptions for reference.

active_state:
  components_keep:
    # Identity + design pointer.
    - adeInfo                 # designInfo + projectDir + description
    # Per-analysis full settings — for pss/pnoise the active.state entry
    # is more complete than SKILL's maeGetAnalysis (which omits defaults).
    - analyses                # <analysis Name="pss|pnoise|tran|ac|dc|noise|sp|stb">
    # Per-test variables — distinct scope from sdb's globals.
    - variables
    # RF stimulus — large-signal sources for PSS; not in SKILL track.
    - rfstim
    # Simulator engine selection — Spectre X accuracy preset (AX / CX /
    # MX) and APS-vs-Spectre-X choice live here.
    - turboOptions            # uniMode / spectreXAccuracyScale / mtOption / ...
    # Optional per-test setups — populated only when the user uses these
    # features, but high-signal when populated.
    - mdlOptions              # MDL measurement testbench cell ref
    - mtsSetup                # multi-technology simulation
    - graphicalStimuli        # GUI-drawn stimulus waveforms

  components_drop:
    # Redundant with the SKILL track — the same data is in
    # ``state_from_skill.txt`` under ``maeGetTestOutputs() expanded`` /
    # ``maeGetEnvOption()`` (which embeds modelFiles).  Active.state
    # adds ~700 lines of GUI scratch fields per cell when included.
    # - outputs                # = maeGetTestOutputs (in SKILL track)
    # - environmentOptions     # = maeGetEnvOption    (in SKILL track)
    # - modelSetup             # = maeGetEnvOption.modelFiles
    # Pure GUI defaults across all observed cells (verified against
    # 5 example_artifacts cells — 0 fields vary).
    # - simulatorOptions       # spectre options (temp/reltol/...) — 151/152
    #                          # fields are GUI defaults; uncomment to
    #                          # capture user overrides of temp / tnom / etc.
    # - convergence            # convergence aids (gmin/homotopy/...)
    # - cosimOptions           # AMS / mixed-signal cosim
    # - devCheckingSetup       # device-checking / DC op-point check
    # - emirOptions            # EMIR (electromigration / IR drop)
    # - faultRules             # fault-injection rules
    # - faults                 # specific fault definitions
    # - opPoints               # operating-point save list
    # - otherInfo              # misc GUI scratch
    # - paramSetup             # parametric-analysis setup (sdb covers this)
    # - relxOptions            # RelXpert / reliability sim
    # - simulationFiles        # extra include / stim files
    # - subckts                # subckt overrides

# ---------------------------------------------------------------------------
# Per-point run artifacts
# ---------------------------------------------------------------------------
# Snapshot walks the per-point run directory
#   <scratch>/<lib>/<cell>/<view>/results/maestro/<history>/<pt>/<tb>/
# and pulls files matching the lists below.  Each entry is a
# ``find -name`` pattern — exact basename or a shell glob (``*.tran``).
# Items in a list are included; comment out a line to skip it.
#
# Defaults target the "Budget A" design-review set documented in
# logs/snapshot_anatomy_20260422.md.  Redundant / non-semantic files
# are listed commented-out so you can cheaply opt in.
#
# Not listed here = not pulled.  Files physically in Cadence's
# per-point dir but never listed (e.g. ``*.raw`` binary waveforms,
# ``wavedb/``, ``modelParameter.info``) are deliberately skipped.
#
# Each group carries one of these recommendation tags so you can decide
# what to opt in at a glance:
#
#   [KEEP]        ← on by default; unambiguously useful (design /
#                   testbench / sim result); recommended to keep enabled
#   [REDUNDANT]   ← off by default; same info already in a [KEEP] file;
#                   enabling just adds bytes, no new information
#   [SCAFFOLDING] ← off by default; Cadence netlist-assembly internals,
#                   no design semantics
#   [METADATA]    ← off by default; per-run progress / IPC / counters
#   [DEBUG-ONLY]  ← off by default; large text logs, only useful when
#                   debugging a failed simulation
#   [GUI-CONFIG]  ← off by default; Maestro session prefs, irrelevant
#                   to the circuit or the sim
#   [RARELY]      ← off by default; occasionally useful but niche
#   [NEVER]       ← off by default; listed only so you know they exist
#                   — turning these on explodes snapshot size without
#                   adding design-level information

per_point:

  # Files under each per-point ``.../netlist/`` directory.
  netlist:
    # --- [KEEP] Budget-A must-reads (the only 4 worth reading per point) ---
    - netlist              # main SPICE netlist (subckts + primitive instances)
    - input.scs            # top-level testbench (models + analyses + parameters)
    - qpInformation.ils    # FOM / output-expression definitions
    - paramInfo.ils        # corner-label + run/point id

    # --- [REDUNDANT] Same info as a [KEEP] file, different form ----------
    # - .controlStatements   # = input.scs's pss/pnoise/pm0/save block
    # - .designVariables     # = input.scs's `parameters ...` line
    # - .modelFiles          # = input.scs's PDK `include`
    # - .includedModels      # MOS-model-name list (also visible in netlist)
    # - netlistHeader        # leading comments already inside `netlist`
    # - variables_file       # PSF-format VDD/Vcm snapshot (= .designVariables)
    # - designInfo           # = state_from_skill.txt's designInfo probe
    # - toolArgs.ils         # mostly abs paths; relevant bits in state_from_skill
    # - exprOutputs.json     # JSON form of qpInformation.ils content

    # --- [SCAFFOLDING] Netlist-assembly internals, no design semantics --
    # - control              # `[?netlistHeader] [?variables] ...` directive
    # - spectre.inp          # 1-line "Spectre Source Statements" comment
    # - spectre.sim          # entirely commented-out example analyses
    # - tmpNetlistFile       # 1-line `include "netlist"` stub
    # - netlistFooter        # always 0 bytes
    # - si.env               # netlister internal env

    # --- [METADATA] Runtime / progress / spectre invocation -------------
    # - runSimulation        # spectre CLI line used to launch sim
    # - tempRun              # duplicate of runSimulation
    # - .tries
    # - .spectre_port
    # - .netlistPointTimeStamp

    # --- [DEBUG-ONLY] Verbose per-point logs ----------------------------
    # - artistLogFile        # PSF log header block
    # - artSimEnvLog         # ~3-line netlister status
    # - amps_evaluator.log   # single process id
    # - exprOutputs.log      # verbose output-expr evaluation log
    # - si.foregnd.log       # full Cadence session log (~35 KB per point)

    # --- [GUI-CONFIG] Maestro / ADE session prefs, irrelevant to sim ----
    # - .vdsenv.il
    # - .vdsinit.il
    # - .__master.optionFile
    # - .__master.termorder   # top-cell pin order (already in netlist)
    # - ".*.parameters"       # per-subckt MOS-type list (dotfile glob)

  # Files under each per-point ``.../psf/`` directory.
  psf:
    # --- [KEEP] Spectre simulator console output ---
    - spectre.out          # stdout of this point's spectre run
    - logFile              # per-point spectre log

    # --- [KEEP] DC operating point ---
    - dcOp.dc
    - dcOpInfo.info

    # --- [KEEP] PSF design-variable snapshot for this point ---
    - variables_file

    # --- [KEEP] Per-analysis result files (matched by suffix glob) ------
    - "*.ac"
    - "*.dc"
    - "*.tran"
    - "*.noise"
    - "*.pss"
    - "*.pnoise"
    - "*.pac"
    - "*.pxf"
    - "*.stb"
    - "*.xf"
    - "*.sens"

    # --- [RARELY] Spectre state / initial conditions --------------------
    # - spectre.dc
    # - spectre.ic
    # - spectre.fc

    # --- [NEVER] PDK dumps + binary waveforms ---------------------------
    # Listed only for reference — enabling any of these balloons the
    # snapshot size without adding DUT-level information (PDK models are
    # already available via .modelFiles, binary waveforms should be read
    # through reader.runs.read_results instead of copied verbatim).
    # - modelParameter.info          # ~100 KB PDK model params, already in .scs
    # - element.info                 # post-flatten per-element bias
    # - primitives.info.primitives   # PDK primitive catalog
    # - subckts.info.subckts         # PDK subckt dumps
    # - designParamVals.info         # derived parameter expansions
    # - outputParameter.info         # derived output-expr dumps
    # - "*.raw"                      # binary PSF waveforms (MB-scale)
